<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Art YAML Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg-panel: #16213e;
    --bg-card: #0f3460;
    --bg-card-hover: #1a4a7a;
    --bg-card-selected: #e94560;
    --bg-input: #1a1a2e;
    --text: #e0e0e0;
    --text-muted: #888;
    --text-selected: #fff;
    --accent: #e94560;
    --accent-dim: #a03050;
    --border: #2a2a4a;
    --success: #4caf50;
    --warning: #ff9800;
    --radius: 6px;
    --font: system-ui, -apple-system, sans-serif;
    --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* --- Toolbar --- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar h1 {
    font-size: 14px;
    font-weight: 600;
    margin-right: auto;
    white-space: nowrap;
  }
  .toolbar select, .toolbar input[type="text"] {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    font-size: 13px;
    font-family: var(--font);
  }
  .toolbar label {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    white-space: nowrap;
  }
  .toolbar .count {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .toolbar input[type="text"] {
    width: 180px;
  }

  /* --- Main layout --- */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* --- List panel --- */
  .list-panel {
    width: 280px;
    min-width: 200px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg-panel);
    flex-shrink: 0;
  }
  .list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background-color 0.1s;
  }
  .list-item:hover {
    background: var(--bg-card-hover);
  }
  .list-item.selected {
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    padding-left: 7px;
  }
  .list-item img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .list-item-info {
    flex: 1;
    min-width: 0;
  }
  .list-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-item .no-desc {
    color: var(--warning);
    font-size: 10px;
    font-weight: 600;
  }

  /* --- Editor panel --- */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 14px;
  }

  .editor-image {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    padding: 12px;
    position: relative;
  }
  .editor-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  .editor-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 6px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .editor-nav button {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 14px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
  }
  .editor-nav button:hover { background: var(--bg-card-hover); }
  .editor-nav button:disabled { opacity: 0.3; cursor: default; }
  .editor-nav .nav-info {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    min-width: 80px;
    text-align: center;
  }

  .editor-form {
    padding: 12px 16px;
    background: var(--bg-panel);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-row {
    display: flex;
    align-items: start;
    gap: 8px;
  }
  .form-row label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    width: 80px;
    flex-shrink: 0;
    padding-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-row input, .form-row textarea {
    flex: 1;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font);
    resize: vertical;
  }
  .form-row textarea { min-height: 50px; }
  .form-row input:focus, .form-row textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-row .readonly {
    color: var(--text-muted);
    padding-top: 5px;
    font-size: 13px;
    font-family: var(--font-mono);
  }
  .form-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
  }
  .btn-save:hover { background: var(--accent-dim); }
  .btn-save:disabled { opacity: 0.4; cursor: default; }
  .save-status {
    font-size: 12px;
    transition: opacity 0.3s;
  }
  .save-status.success { color: var(--success); }
  .save-status.error { color: var(--accent); }
  .save-status.dirty { color: var(--warning); }

  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }
  .btn-script {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-mono);
    white-space: nowrap;
    transition: background-color 0.1s;
  }
  .btn-script:hover { background: var(--bg-card-hover); }
  .btn-script:disabled { opacity: 0.4; cursor: default; }
  .btn-script.running {
    border-color: var(--warning);
    color: var(--warning);
  }

  .script-output {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 40vh;
    background: #111;
    border-top: 2px solid var(--border);
    overflow-y: auto;
    z-index: 100;
    display: none;
  }
  .script-output.visible { display: block; }
  .script-output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  .script-output-header span {
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-mono);
  }
  .script-output-header button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
  }
  .script-output pre {
    padding: 8px 12px;
    font-size: 12px;
    font-family: var(--font-mono);
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    margin: 0;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <h1>Art YAML Editor</h1>
    <input type="text" id="search" placeholder="Search title/id...">
    <select id="tag-filter"><option value="">All tags</option></select>
    <label><input type="checkbox" id="no-desc-filter"> Missing description</label>
    <span class="count" id="count"></span>
    <span class="toolbar-sep"></span>
    <button class="btn-script" id="btn-update" title="Run art:update (discover new scans)">art:update</button>
    <button class="btn-script" id="btn-convert" title="Run art:convert (process images)">art:convert</button>
  </div>
  <div class="main">
    <div class="list-panel" id="list"></div>
    <div class="editor-panel" id="editor">
      <div class="editor-empty">Select an entry from the list</div>
    </div>
  </div>
  <div class="script-output" id="script-output">
    <div class="script-output-header">
      <span id="script-output-title"></span>
      <button id="script-output-close">&times;</button>
    </div>
    <pre id="script-output-body"></pre>
  </div>

<script>
(function() {
  let entries = [];
  let filteredIds = [];
  let selectedId = null;
  let dirty = false;

  const $list = document.getElementById("list");
  const $editor = document.getElementById("editor");
  const $tagFilter = document.getElementById("tag-filter");
  const $noDescFilter = document.getElementById("no-desc-filter");
  const $search = document.getElementById("search");
  const $count = document.getElementById("count");

  // --- Load data ---
  async function loadData() {
    const [entriesRes, tagsRes] = await Promise.all([
      fetch("/api/entries"),
      fetch("/api/tags"),
    ]);
    entries = await entriesRes.json();
    const tags = await tagsRes.json();

    // Populate tag dropdown
    for (const tag of tags) {
      const opt = document.createElement("option");
      opt.value = tag;
      opt.textContent = tag;
      $tagFilter.appendChild(opt);
    }

    applyFilter();
  }

  // --- Filtering ---
  function applyFilter() {
    const tag = $tagFilter.value;
    const noDesc = $noDescFilter.checked;
    const search = $search.value.trim().toLowerCase();

    filteredIds = entries
      .filter(e => {
        if (tag && !e.tags.includes(tag)) return false;
        if (noDesc && e.description && e.description.trim() !== "") return false;
        if (search && !e.title.toLowerCase().includes(search) && !e.id.toLowerCase().includes(search)) return false;
        return true;
      })
      .map(e => e.id);

    $count.textContent = filteredIds.length + " / " + entries.length;
    renderList();

    // If selected entry is no longer in filtered list, keep it but don't auto-switch
  }

  $tagFilter.addEventListener("change", applyFilter);
  $noDescFilter.addEventListener("change", applyFilter);
  $search.addEventListener("input", applyFilter);

  // --- List rendering ---
  function renderList() {
    $list.innerHTML = "";
    for (const id of filteredIds) {
      const entry = entries.find(e => e.id === id);
      if (!entry) continue;

      const thumb = entry.thumbnails?.[0]?.src;
      const div = document.createElement("div");
      div.className = "list-item" + (id === selectedId ? " selected" : "");
      div.dataset.id = id;

      const hasDesc = entry.description && entry.description.trim() !== "";

      div.innerHTML =
        '<img src="' + (thumb ? "/images/" + encodeURIComponent(thumb) : "") + '" alt="" loading="lazy">' +
        '<div class="list-item-info">' +
          '<div class="list-item-title">' + escapeHtml(entry.title) + '</div>' +
          '<div class="list-item-meta">' + escapeHtml(entry.created) +
            (hasDesc ? "" : ' <span class="no-desc">NO DESC</span>') +
          '</div>' +
        '</div>';

      div.addEventListener("click", () => selectEntry(id));
      $list.appendChild(div);
    }
  }

  // --- Selection ---
  function selectEntry(id, skipDirtyCheck) {
    if (!skipDirtyCheck && dirty) {
      if (!confirm("You have unsaved changes. Discard?")) return;
    }
    selectedId = id;
    dirty = false;
    renderList();
    renderEditor();

    // Scroll selected into view
    const el = $list.querySelector(".selected");
    if (el) el.scrollIntoView({ block: "nearest" });
  }

  function selectByOffset(offset) {
    const idx = filteredIds.indexOf(selectedId);
    const next = idx + offset;
    if (next >= 0 && next < filteredIds.length) {
      selectEntry(filteredIds[next]);
    }
  }

  // --- Editor rendering ---
  function renderEditor() {
    const entry = entries.find(e => e.id === selectedId);
    if (!entry) {
      $editor.innerHTML = '<div class="editor-empty">Select an entry from the list</div>';
      return;
    }

    const idx = filteredIds.indexOf(selectedId);
    const imageSrc = entry.images?.[entry.images.length > 1 ? 1 : 0]?.src;

    $editor.innerHTML =
      '<div class="editor-image">' +
        (imageSrc ? '<img src="/images/' + encodeURIComponent(imageSrc) + '" alt="' + escapeHtml(entry.title) + '">' : '<span style="color:var(--text-muted)">No image</span>') +
      '</div>' +
      '<div class="editor-nav">' +
        '<button id="btn-prev" ' + (idx <= 0 ? "disabled" : "") + '>&larr; Prev</button>' +
        '<span class="nav-info">' + (idx + 1) + ' / ' + filteredIds.length + '</span>' +
        '<button id="btn-next" ' + (idx >= filteredIds.length - 1 ? "disabled" : "") + '>Next &rarr;</button>' +
      '</div>' +
      '<div class="editor-form">' +
        '<div class="form-row"><label>ID</label><span class="readonly">' + escapeHtml(entry.id) + '</span></div>' +
        '<div class="form-row"><label>Created</label><span class="readonly">' + escapeHtml(entry.created) + '</span></div>' +
        '<div class="form-row"><label>Title</label><input type="text" id="f-title" value="' + escapeAttr(entry.title) + '"></div>' +
        '<div class="form-row"><label>Description</label><textarea id="f-desc" rows="6">' + escapeHtml(entry.description || "") + '</textarea></div>' +
        '<div class="form-row"><label>Tags</label><input type="text" id="f-tags" value="' + escapeAttr(entry.tags.join(", ")) + '"></div>' +
        '<div class="form-actions">' +
          '<button class="btn-save" id="btn-save">Save (Ctrl+S)</button>' +
          '<span class="save-status" id="save-status"></span>' +
        '</div>' +
      '</div>';

    // Event listeners
    document.getElementById("btn-prev").addEventListener("click", () => selectByOffset(-1));
    document.getElementById("btn-next").addEventListener("click", () => selectByOffset(1));
    document.getElementById("btn-save").addEventListener("click", saveEntry);

    const markDirty = () => {
      if (!dirty) {
        dirty = true;
        const s = document.getElementById("save-status");
        if (s) { s.textContent = "Unsaved changes"; s.className = "save-status dirty"; }
      }
    };
    document.getElementById("f-title").addEventListener("input", markDirty);
    document.getElementById("f-desc").addEventListener("input", markDirty);
    document.getElementById("f-tags").addEventListener("input", markDirty);
  }

  // --- Save ---
  async function saveEntry() {
    const entry = entries.find(e => e.id === selectedId);
    if (!entry) return;

    const title = document.getElementById("f-title").value;
    const description = document.getElementById("f-desc").value;
    const tags = document.getElementById("f-tags").value
      .split(",")
      .map(t => t.trim())
      .filter(Boolean);

    const btn = document.getElementById("btn-save");
    const status = document.getElementById("save-status");
    btn.disabled = true;

    try {
      const res = await fetch("/api/entries/" + encodeURIComponent(entry.id), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description, tags }),
      });

      if (!res.ok) throw new Error("Save failed: " + res.status);

      // Update local state
      entry.title = title;
      entry.description = description;
      entry.tags = tags;
      dirty = false;

      status.textContent = "Saved";
      status.className = "save-status success";
      setTimeout(() => { if (status.textContent === "Saved") { status.textContent = ""; } }, 2000);

      // Re-render list to update title/desc indicators
      renderList();
    } catch (err) {
      status.textContent = "Error: " + err.message;
      status.className = "save-status error";
    } finally {
      btn.disabled = false;
    }
  }

  // --- Keyboard shortcuts ---
  document.addEventListener("keydown", (e) => {
    // Don't capture when typing in inputs (except Ctrl+S)
    const inInput = e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT";

    if ((e.ctrlKey || e.metaKey) && e.key === "s") {
      e.preventDefault();
      saveEntry();
      return;
    }

    if (inInput) return;

    if (e.key === "ArrowUp" || e.key === "k") {
      e.preventDefault();
      selectByOffset(-1);
    } else if (e.key === "ArrowDown" || e.key === "j") {
      e.preventDefault();
      selectByOffset(1);
    }
  });

  // --- Script runner ---
  async function runScript(script) {
    const btn = document.getElementById(script === "art:update" ? "btn-update" : "btn-convert");
    const panel = document.getElementById("script-output");
    const title = document.getElementById("script-output-title");
    const body = document.getElementById("script-output-body");

    btn.disabled = true;
    btn.classList.add("running");
    btn.textContent = script + " ...";
    title.textContent = "Running npm run " + script + "...";
    body.textContent = "";
    panel.classList.add("visible");

    try {
      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ script }),
      });
      const data = await res.json();
      body.textContent = data.output || "(no output)";
      if (data.ok) {
        title.textContent = "npm run " + script + " — done";
        // Reload entries in case art:update added new ones or art:convert changed data
        const entriesRes = await fetch("/api/entries");
        entries = await entriesRes.json();
        applyFilter();
        if (selectedId) renderEditor();
      } else {
        title.textContent = "npm run " + script + " — FAILED";
      }
    } catch (err) {
      body.textContent = "Request failed: " + err.message;
      title.textContent = "npm run " + script + " — ERROR";
    } finally {
      btn.disabled = false;
      btn.classList.remove("running");
      btn.textContent = script;
    }
  }

  document.getElementById("btn-update").addEventListener("click", () => runScript("art:update"));
  document.getElementById("btn-convert").addEventListener("click", () => runScript("art:convert"));
  document.getElementById("script-output-close").addEventListener("click", () => {
    document.getElementById("script-output").classList.remove("visible");
  });

  // --- Warn before leaving with unsaved changes ---
  window.addEventListener("beforeunload", (e) => {
    if (dirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  // --- Helpers ---
  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function escapeAttr(s) {
    return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  loadData();
})();
</script>
</body>
</html>
